<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twinkle Hearts — Volunteer Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf8f2; --coral: #e8705a; --coral-dark: #c95840;
    --teal: #3a7d7b; --teal-light: #e8f2f2;
    --charcoal: #2c2c2c; --mid: #6b6560; --border: #e8e0d8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "DM Sans", sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; }
  .header { background: var(--charcoal); padding: 20px 20px 18px; position: relative; overflow: hidden; }
  .header::before { content: ""; position: absolute; top: -40px; right: -40px; width: 200px; height: 200px; border-radius: 50%; background: var(--coral); opacity: 0.15; }
  .header-inner { max-width: 700px; margin: 0 auto; position: relative; }
  .header h1 { font-family: "DM Serif Display", serif; font-size: clamp(22px, 5vw, 28px); color: #fff; }
  .header h1 span { color: var(--coral); font-style: italic; }
  .header p { color: #b8b0a8; font-size: 13.5px; margin-top: 5px; font-weight: 300; }
  .main { max-width: 700px; margin: 0 auto; padding: 24px 16px 60px; }
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-wrap input { width: 100%; padding: 16px 52px 16px 20px; font-family: "DM Sans", sans-serif; font-size: 16px; border: 2px solid var(--border); border-radius: 14px; background: #fff; color: var(--charcoal); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .search-wrap input::placeholder { color: #b8b0a8; }
  .search-wrap input:focus { border-color: var(--coral); box-shadow: 0 0 0 4px rgba(232,112,90,0.1); }
  .search-icon { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: #b8b0a8; pointer-events: none; font-size: 18px; }
  .hint { font-size: 12px; color: #b8b0a8; margin-bottom: 28px; padding-left: 4px; }
  .results-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
  .results-title { font-family: "DM Serif Display", serif; font-size: clamp(18px, 4vw, 22px); }
  .results-title span { color: var(--coral); }
  .results-count { font-size: 12.5px; color: var(--mid); font-weight: 500; }
  .stats-strip { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-pill { background: #fff; border: 1.5px solid var(--border); border-radius: 40px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat-pill .dot.coral { background: var(--coral); }
  .stat-pill .dot.teal  { background: var(--teal); }
  .event-card { background: #fff; border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; transition: border-color 0.15s, transform 0.15s; animation: fadeUp 0.2s ease both; }
  .event-card:hover { border-color: var(--coral); transform: translateY(-1px); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .card-left { flex: 1; }
  .card-event { font-weight: 500; font-size: 14.5px; line-height: 1.4; margin-bottom: 4px; }
  .card-meta { font-size: 12px; color: var(--mid); display: flex; gap: 12px; flex-wrap: wrap; }
  .attended-badge { flex-shrink: 0; margin-left: 14px; padding: 5px 12px; border-radius: 20px; font-size: 11.5px; font-weight: 600; }
  .attended-badge.yes { background: var(--teal-light); color: var(--teal); }
  .attended-badge.no  { background: #ffeee9; color: var(--coral-dark); }
  .year-divider { display: flex; align-items: center; gap: 10px; margin: 24px 0 14px; }
  .year-divider::before, .year-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .year-divider span { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mid); }
  .state-box { text-align: center; padding: 60px 20px; }
  .state-icon { font-size: 40px; margin-bottom: 14px; }
  .state-box h3 { font-family: "DM Serif Display", serif; font-size: 20px; margin-bottom: 8px; }
  .state-box p { color: var(--mid); font-size: 14px; line-height: 1.6; }
  .multi-match { background: #fff8f0; border: 1.5px solid #f0d8c0; border-radius: 12px; padding: 14px 18px; margin-bottom: 20px; font-size: 13px; }
  .multi-match strong { display: block; margin-bottom: 8px; }
  .name-btn { display: inline-block; margin: 3px; padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; cursor: pointer; font-size: 13px; font-family: "DM Sans", sans-serif; transition: border-color 0.15s, background 0.15s; }
  .name-btn:hover { border-color: var(--coral); background: #fff5f3; }
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 28px; }
  .tab-btn { padding: 12px 20px; font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 500; background: none; border: none; border-bottom: 3px solid transparent; margin-bottom: -2px; cursor: pointer; color: var(--mid); transition: color 0.15s, border-color 0.15s; white-space: nowrap; flex-shrink: 0; }
  .tab-btn.active { color: var(--coral); border-bottom-color: var(--coral); }
  .tab-btn:hover:not(.active) { color: var(--charcoal); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .lb-note { font-size: 12.5px; color: var(--mid); background: #f5f0ea; border-radius: 10px; padding: 10px 14px; margin-bottom: 18px; line-height: 1.6; }
  .leaderboard { list-style: none; }
  .lb-row { display: flex; align-items: center; gap: 16px; background: #fff; border: 1.5px solid var(--border); border-radius: 14px; padding: 16px 20px; margin-bottom: 10px; transition: border-color 0.15s, transform 0.15s; animation: fadeUp 0.2s ease both; }
  .lb-row:hover { border-color: var(--coral); transform: translateY(-1px); }
  .lb-rank { font-family: "DM Serif Display", serif; font-size: 22px; color: var(--border); width: 32px; text-align: center; flex-shrink: 0; }
  .lb-rank.gold   { color: #c9a84c; }
  .lb-rank.silver { color: #9ca3af; }
  .lb-rank.bronze { color: #b07040; }
  .lb-name { flex: 1; font-weight: 500; font-size: 15px; }
  .lb-bar-wrap { flex: 2; background: #f5ede9; border-radius: 20px; height: 8px; overflow: hidden; }
  .lb-bar { height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--coral), #f0a090); transition: width 0.6s ease; }
  .lb-count { font-weight: 600; font-size: 14px; color: var(--coral); min-width: 36px; text-align: right; flex-shrink: 0; }
  .lb-label { font-size: 11px; color: var(--mid); }
  footer { text-align: center; padding: 20px; font-size: 11.5px; color: #c8c0b8; border-top: 1px solid var(--border); max-width: 700px; margin: 0 auto; }

  @media (max-width: 600px) {
    .header { padding: 20px 18px 18px; }
    .header h1 { font-size: 22px; }
    .header p { font-size: 12px; }
    .main { padding: 20px 14px 50px; }
    .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab-btn { padding: 10px 16px; font-size: 13px; white-space: nowrap; }
    .search-wrap input { font-size: 15px; padding: 14px 44px 14px 16px; }
    .hint { font-size: 11.5px; }
    .results-title { font-size: 18px; }
    .event-card { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px 16px; }
    .attended-badge { margin-left: 0; }
    .stats-strip { gap: 8px; }
    .stat-pill { padding: 6px 12px; font-size: 12px; }
    .lb-row { gap: 10px; padding: 12px 14px; }
    .lb-bar-wrap { display: none; }
    .lb-name { font-size: 14px; }
    .lb-rank { font-size: 18px; width: 24px; }
    .state-box { padding: 40px 16px; }
    .state-icon { font-size: 32px; }
    .state-box h3 { font-size: 17px; }
    footer { font-size: 11px; padding: 16px; }
  }
  @media (max-width: 480px) {
    .lb-bar-wrap { display: none; }
    .lb-row { gap: 10px; }
    .stats-strip { gap: 8px; }
    .stat-pill { padding: 6px 12px; font-size: 12px; }
    .attended-badge { padding: 4px 10px; font-size: 11px; }
    .card-event { font-size: 13.5px; }
    .results-header { flex-direction: column; gap: 4px; }
    .header { padding: 16px; }
    .main { padding: 16px 12px 60px; }
  }
  @media (max-width: 360px) {
    .tab-btn { padding: 10px 14px; font-size: 13px; }
  }
</style>
</head>

  <div id="tab-leaderboard" class="tab-panel">
    <div id="leaderboard-content"></div>
  </div>

</div>
<footer>Twinkle Hearts · Internal volunteer records</footer>

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function formatDate(d) {
  if (!d || !d.match(/^\d{4}-\d{2}-\d{2}$/)) return d || "—";
  const [y,m,dd] = d.split("-");
  return `${parseInt(dd)} ${MONTHS[parseInt(m)-1]} ${y}`;
}

// Match if query equals the full name (case-insensitive)
function nameMatchesQuery(name, q) {
  return name.toLowerCase() === q.toLowerCase();
}

const input = document.getElementById("searchInput");
const output = document.getElementById("output");

function showRecords(results) {
  results.sort((a,b) => b.date.localeCompare(a.date));
  const attended = results.filter(r => r.attended === 1).length;
  const absent = results.filter(r => r.attended !== 1).length;
  const years = [...new Set(results.map(r => r.date.slice(0,4)))].sort().reverse();
  const displayName = results[0].name;

  let html = `
    <div class="results-header">
      <div class="results-title">Records for <span>${displayName}</span></div>
      <div class="results-count">${results.length} entries</div>
    </div>
    <div class="stats-strip">
      <div class="stat-pill"><span class="dot coral"></span><strong>${attended}</strong>&nbsp;attended</div>
      ${absent > 0 ? `<div class="stat-pill"><span class="dot" style="background:#e8b0a0"></span><strong>${absent}</strong>&nbsp;absent</div>` : ""}
      <div class="stat-pill"><span class="dot teal"></span><strong>${years.length}</strong>&nbsp;year${years.length!==1?"s":""}</div>
    </div>`;

  const byYear = {};
  results.forEach(r => {
    const y = r.date.slice(0,4);
    if (!byYear[y]) byYear[y] = [];
    byYear[y].push(r);
  });

  Object.keys(byYear).sort().reverse().forEach(year => {
    html += `<div class="year-divider"><span>${year}</span></div>`;
    byYear[year].forEach(r => {
      html += `
        <div class="event-card">
          <div class="card-left">
            <div class="card-event">${r.event}</div>
            <div class="card-meta">
              <span>📅 ${formatDate(r.date)}</span>
              ${r.beneficiary ? `<span>📍 ${r.beneficiary}</span>` : ""}
            </div>
          </div>
          <span class="attended-badge ${r.attended===1?"yes":"no"}">${r.attended===1?"✓ Attended":"✗ Absent"}</span>
        </div>`;
    });
  });

  output.innerHTML = html;
}

function search(q) {
  q = q.trim();
  if (q.length < 2) {
    output.innerHTML = `<div class="state-box"><div class="state-icon">🔍</div><h3>Search your name</h3><p>Type your name above to see all the events you have joined.</p></div>`;
    return;
  }

  const results = DATA.filter(r => nameMatchesQuery(r.name, q));

  if (!results.length) {
    output.innerHTML = `<div class="state-box"><div class="state-icon">🤔</div><h3>No records found</h3><p>No one matching "<strong>${q}</strong>" was found.<br>Try a different spelling or your first name only.</p></div>`;
    return;
  }

  // Check if multiple distinct people match
  const distinctNames = [...new Set(results.map(r => r.name))];
  if (distinctNames.length > 1) {
    let html = `<div class="multi-match"><strong>Multiple people match "${q}" — select your name:</strong>`;
    distinctNames.sort().forEach(n => {
      const count = results.filter(r => r.name === n).length;
      html += `<button class="name-btn" onclick="selectName('${n.replace(/'/g, "\'")}')">${n} <span style="color:#aaa">(${count})</span></button>`;
    });
    html += `</div>`;
    output.innerHTML = html;
    return;
  }

  showRecords(results);
}

function selectName(name) {
  const results = DATA.filter(r => r.name === name);
  showRecords(results);
}

input.addEventListener("input", () => search(input.value));
search("");

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'leaderboard') renderLeaderboard();
}
