<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twinkle Hearts — Volunteer Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf8f2;
    --warm-white: #fff9f4;
    --coral: #e8705a;
    --coral-light: #f5ede9;
    --coral-dark: #c95840;
    --teal: #3a7d7b;
    --teal-light: #e8f2f2;
    --charcoal: #2c2c2c;
    --mid: #6b6560;
    --border: #e8e0d8;
    --gold: #c9a84c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--charcoal);
    padding: 28px 32px 24px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: var(--coral);
    opacity: 0.15;
  }
  .header-inner { max-width: 700px; margin: 0 auto; position: relative; }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .header h1 span { color: var(--coral); font-style: italic; }
  .header p {
    color: #b8b0a8;
    font-size: 13.5px;
    margin-top: 5px;
    font-weight: 300;
  }

  /* ── Main ── */
  .main { max-width: 700px; margin: 0 auto; padding: 32px 20px 60px; }

  /* ── Search box ── */
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-wrap input {
    width: 100%;
    padding: 16px 52px 16px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    border: 2px solid var(--border);
    border-radius: 14px;
    background: #fff;
    color: var(--charcoal);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input::placeholder { color: #b8b0a8; }
  .search-wrap input:focus {
    border-color: var(--coral);
    box-shadow: 0 0 0 4px rgba(232,112,90,0.1);
  }
  .search-icon {
    position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    color: #b8b0a8; pointer-events: none; font-size: 18px;
  }
  .hint { font-size: 12px; color: #b8b0a8; margin-bottom: 28px; padding-left: 4px; }

  /* ── Results ── */
  .results-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 16px;
  }
  .results-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
  .results-title span { color: var(--coral); }
  .results-count { font-size: 12.5px; color: var(--mid); font-weight: 500; }

  /* Stats strip */
  .stats-strip {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .stat-pill {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 40px;
    padding: 8px 16px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px;
  }
  .stat-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .stat-pill .dot.coral { background: var(--coral); }
  .stat-pill .dot.teal  { background: var(--teal); }
  .stat-pill .dot.gold  { background: var(--gold); }
  .stat-pill strong { font-weight: 600; }

  /* Cards */
  .event-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
    transition: border-color 0.15s, transform 0.15s;
    animation: fadeUp 0.25s ease both;
  }
  .event-card:hover { border-color: var(--coral); transform: translateY(-1px); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .event-card:nth-child(2)  { animation-delay: 0.03s; }
  .event-card:nth-child(3)  { animation-delay: 0.06s; }
  .event-card:nth-child(4)  { animation-delay: 0.09s; }
  .event-card:nth-child(5)  { animation-delay: 0.12s; }

  .card-left { flex: 1; }
  .card-event { font-weight: 500; font-size: 14.5px; line-height: 1.4; margin-bottom: 4px; }
  .card-meta { font-size: 12px; color: var(--mid); display: flex; gap: 12px; flex-wrap: wrap; }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .card-meta svg { opacity: 0.5; }

  .attended-badge {
    flex-shrink: 0; margin-left: 14px;
    padding: 5px 12px; border-radius: 20px;
    font-size: 11.5px; font-weight: 600; letter-spacing: 0.3px;
  }
  .attended-badge.yes { background: var(--teal-light); color: var(--teal); }
  .attended-badge.no  { background: #ffeee9; color: var(--coral-dark); }

  /* Year divider */
  .year-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 24px 0 14px;
  }
  .year-divider::before, .year-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .year-divider span {
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--mid);
  }

  /* Empty / idle states */
  .state-box {
    text-align: center; padding: 60px 20px;
  }
  .state-icon { font-size: 40px; margin-bottom: 14px; }
  .state-box h3 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 8px; }
  .state-box p  { color: var(--mid); font-size: 14px; line-height: 1.6; }

  /* Footer */
  footer {
    text-align: center; padding: 20px;
    font-size: 11.5px; color: #c8c0b8;
    border-top: 1px solid var(--border);
    max-width: 700px; margin: 0 auto;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>Twinkle <span>Hearts</span></h1>
    <p>Volunteer Attendance Records · 2023 – 2026</p>
  </div>
</div>

<div class="main">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search your name…" autocomplete="off" spellcheck="false">
    <span class="search-icon">⌕</span>
  </div>
  <p class="hint">Type at least 2 characters to search. Partial names work too.</p>
  <div id="output"></div>
</div>

<footer>Twinkle Hearts · Internal volunteer records</footer>

const DATA = [...RAW, ...EXTRA];

function getYear(d) {
  if (!d) return 'Unknown';
  if (d.match(/^\d{4}-/)) return d.slice(0,4);
  return 'Unknown';
}

function formatDate(d) {
  if (!d || d === 'Unknown') return '—';
  if (d.match(/^\d{4}-\d{2}-\d{2}$/)) {
    const [y,m,dd] = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${parseInt(dd)} ${months[parseInt(m)-1]} ${y}`;
  }
  return d;
}

const input = document.getElementById('searchInput');
const output = document.getElementById('output');

function search(q) {
  q = q.trim().toLowerCase();
  if (q.length < 2) {
    output.innerHTML = `<div class="state-box"><div class="state-icon">🔍</div><h3>Search your name</h3><p>Type your name above to see<br>all the events you've joined.</p></div>`;
    return;
  }

  const results = DATA.filter(r => r.name.toLowerCase().includes(q));

  if (!results.length) {
    output.innerHTML = `<div class="state-box"><div class="state-icon">🤔</div><h3>No records found</h3><p>We couldn't find anyone matching "<strong>${q}</strong>".<br>Try a different spelling or your first name only.</p></div>`;
    return;
  }

  // Sort by date descending
  results.sort((a,b) => {
    const da = a.date && a.date.match(/^\d{4}-\d{2}-\d{2}$/) ? a.date : '0000-00-00';
    const db = b.date && b.date.match(/^\d{4}-\d{2}-\d{2}$/) ? b.date : '0000-00-00';
    return db.localeCompare(da);
  });

  const attended = results.filter(r => r.attended === 1).length;
  const notAttended = results.filter(r => r.attended !== 1).length;
  const years = [...new Set(results.map(r => getYear(r.date)).filter(y => y !== 'Unknown'))].sort().reverse();

  let html = `
    <div class="results-header">
      <div class="results-title">Records for <span>${results[0].name}</span></div>
      <div class="results-count">${results.length} entries found</div>
    </div>
    <div class="stats-strip">
      <div class="stat-pill"><span class="dot coral"></span><strong>${attended}</strong>&nbsp;attended</div>
      ${notAttended > 0 ? `<div class="stat-pill"><span class="dot" style="background:#e8b0a0"></span><strong>${notAttended}</strong>&nbsp;not attended</div>` : ''}
      <div class="stat-pill"><span class="dot teal"></span><strong>${years.length}</strong>&nbsp;year${years.length!==1?'s':''}</div>
    </div>`;

  // Group by year
  const byYear = {};
  results.forEach(r => {
    const y = getYear(r.date);
    if (!byYear[y]) byYear[y] = [];
    byYear[y].push(r);
  });

  const sortedYears = Object.keys(byYear).sort().reverse();
  sortedYears.forEach(year => {
    html += `<div class="year-divider"><span>${year}</span></div>`;
    byYear[year].forEach(r => {
      html += `
        <div class="event-card">
          <div class="card-left">
            <div class="card-event">${r.event}</div>
            <div class="card-meta">
              <span>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${formatDate(r.date)}
              </span>
              ${r.beneficiary ? `<span>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${r.beneficiary}
              </span>` : ''}
            </div>
          </div>
          <span class="attended-badge ${r.attended === 1 ? 'yes' : 'no'}">${r.attended === 1 ? '✓ Attended' : '✗ Absent'}</span>
        </div>`;
    });
  });

  output.innerHTML = html;
}

input.addEventListener('input', () => search(input.value));
